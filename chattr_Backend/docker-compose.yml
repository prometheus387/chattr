services:
  postgres:
    image: postgres:18.3-trixie
    container_name: chattr_postgres
    environment:
      POSTGRES_USER: chattr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chattr_db
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chattr"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:8.6.1-trixie
    container_name: chattr_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cap:
    image: tiago2/cap:latest
    container_name: cap
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      ADMIN_KEY: "${CAP_ADMIN_KEY}"
      REDIS_URL: redis://valkey:6379
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped
  
  valkey:
    image: valkey/valkey:9-alpine
    container_name: cap-valkey
    volumes:
      - valkey-data:/data
    command: valkey-server --save 60 1 --loglevel warning --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
  
  seq:
    image: datalust/seq:latest
    container_name: seq
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:5341:5341"
    environment:
      ACCEPT_EULA: "Y"
      # Seq 2025.2 fails startup when this is present but empty.
      SEQ_API_CANONICALURI: "${SEQ_API_CANONICALURI:-http://localhost}"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: "${SEQ_FIRSTRUN_ADMINPASSWORDHASH:?Set SEQ_FIRSTRUN_ADMINPASSWORDHASH}"
    volumes:
      - seq-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  valkey-data:
  seq-data:
    